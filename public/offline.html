<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — POSmaster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .tip {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
      padding: 16px;
      margin: 24px 0;
      text-align: left;
    }
    .tip p {
      color: #15803d;
      font-size: 13px;
      margin: 0;
    }
    .tip p + p { margin-top: 6px; }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">📡</span>
    <h1>Sin conexión a internet</h1>
    <p>POSmaster necesita conexión para sincronizar datos con el servidor.</p>

    <div class="tip">
      <p>✅ <strong>Mientras tanto puedes:</strong></p>
      <p>• Revisar facturas guardadas en el historial</p>
      <p>• Consultar el inventario en caché</p>
      <p>• Preparar ventas para cuando vuelva la conexión</p>
    </div>

    <button onclick="window.location.reload()">
      🔄 Intentar reconectar
    </button>
    <p class="status" id="status">Verificando conexión...</p>
  </div>

  <script>
    // Auto-reconectar cuando vuelva la red
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = '✅ Conexión restaurada. Redirigiendo...';
      setTimeout(() => { window.location.href = '/'; }, 1000);
    });

    window.addEventListener('offline', () => {
      document.getElementById('status').textContent = '❌ Sin conexión';
    });

    navigator.onLine
      ? (document.getElementById('status').textContent = 'Conexión intermitente detectada')
      : (document.getElementById('status').textContent = '❌ Sin conexión a internet');
  </script>
</body>
</html>
